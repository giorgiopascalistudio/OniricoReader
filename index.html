<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onirico Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style-4.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
</head>
<body>

<!-- ════════════════════ LIBRARY VIEW ════════════════════ -->
<div id="view-library" class="view active">
  <header class="lib-header">
    <div class="logo-wrap">
      <img src="logo.webp" alt="Logo" class="logo-img" onerror="this.style.display='none'" />
    </div>
    <nav class="lib-nav">
      <span class="nav-label active-nav">Libreria</span>
      <label class="upload-btn" for="lib-upload">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        Aggiungi PDF
      </label>
      <input type="file" id="lib-upload" accept=".pdf" hidden />
    </nav>
  </header>
  <main class="library-main">
    <section class="lib-section">
      <h1 class="section-title">La tua libreria</h1>
      <div class="pdf-grid" id="pdf-grid">
        <!-- add card -->
        <div class="pdf-card add-card">
          <label class="add-card-inner" for="card-upload">
            <span class="add-icon">＋</span>
            <span class="add-label">Aggiungi PDF</span>
          </label>
          <input type="file" id="card-upload" accept=".pdf" hidden />
        </div>
      </div>
    </section>
  </main>
</div>

<!-- ════════════════════ READER VIEW ════════════════════ -->
<div id="view-reader" class="view">
  <header class="reader-header">
    <div class="logo-wrap">
      <img src="logo.webp" alt="Logo" class="logo-img logo-small" onerror="this.style.display='none'" />
    </div>
    <div class="doc-title-wrap">
      <div class="doc-title" id="doc-title">—</div>
    </div>
    <div class="reader-actions">
      <!-- Zoom out -->
      <button class="icon-btn" id="btn-zoom-out" title="Zoom out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <!-- Zoom in -->
      <button class="icon-btn" id="btn-zoom-in" title="Zoom in">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <!-- Zoom reset -->
      <button class="icon-btn" id="btn-zoom-reset" title="Reset zoom">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3.05 11A9 9 0 1 1 5.6 5.6"/><polyline points="3 3 3 9 9 9"/></svg>
      </button>
      <!-- Hand tool -->
      <button class="icon-btn" id="btn-hand" title="Strumento mano">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 11V8a2 2 0 0 0-4 0v3"/><path d="M14 10V6a2 2 0 0 0-4 0v4"/><path d="M10 9.5V5a2 2 0 0 0-4 0v9"/><path d="M6 14c0 3.31 2.69 6 6 6s6-2.69 6-6v-3H6v3z"/></svg>
      </button>
      <!-- Thumbnails -->
      <button class="icon-btn" id="btn-thumbs" title="Miniature">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <!-- Share -->
      <button class="icon-btn" id="btn-share" title="Condividi PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <!-- Fullscreen -->
      <button class="icon-btn" id="btn-fs" title="Schermo intero">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <!-- Close -->
      <button class="icon-btn close-btn" id="btn-close" title="Chiudi">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </header>

  <div class="reader-body">
    <aside class="thumb-sidebar" id="thumb-sidebar">
      <div class="thumb-list" id="thumb-list"></div>
    </aside>
    <div class="reading-area" id="reading-area">
      <!-- zoom/pan wrapper -->
      <div id="zoom-pan-wrap">
        <div id="book-container"></div>
      </div>
      <button class="nav-arrow left-arrow" id="btn-prev">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-arrow right-arrow" id="btn-next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="loading-spinner" id="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-text">Caricamento…</div>
      </div>
    </div>
  </div>

  <footer class="reader-footer">
    <div class="footer-inner">
      <div class="progress-wrap">
        <div class="progress-track" id="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <span class="page-indicator" id="page-indicator">0 / 0</span>
      </div>
      <div class="controls-row">
        <div class="ctrl-group">
          <button class="ctrl-btn" id="btn-first" title="Prima pagina">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-prev2" title="Pagina precedente">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
        </div>
        <div class="ctrl-group center-ctrl">
          <button class="play-btn" id="btn-play">
            <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
        </div>
        <div class="ctrl-group">
          <button class="ctrl-btn" id="btn-next2" title="Pagina successiva">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-last" title="Ultima pagina">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
          </button>
        </div>
        <div class="ctrl-group speed-group">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <input type="range" class="speed-slider" id="speed-slider" min="0" max="4" step="1" value="2" />
          <span class="speed-label" id="speed-label">3.5s</span>
        </div>
      </div>
    </div>
  </footer>
</div>

<!-- ════════════════════ SHARE MODAL ════════════════════ -->
<div id="share-modal" class="share-overlay" style="display:none">
  <div class="share-box">
    <div class="share-head">
      <span class="share-title">Condividi PDF</span>
      <button class="icon-btn" id="share-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="share-desc">Il destinatario vedrà solo questo PDF — senza accesso alla tua libreria.</p>
    <div class="share-row">
      <input type="text" id="share-input" class="share-input" readonly />
      <button class="share-copy" id="share-copy">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>
    <p class="share-note" id="share-note"></p>
  </div>
</div>

<script src="reader-4.js"></script>
</body>
</html>
